{% extends 'base.html' %}
{% block content %}
    <h2>{{ blog.title }}</h2>
    <p><strong>Autor:</strong> {{ post.author.username }}</p>
    <p><strong>Fecha de creacion:</strong> {{ post.created_at }}</p>
    <div>
        {{ blog.content }}
    </div>
    <a href="{% url 'blog-update' blog.pk %}">Editar publicación</a>
    <a href="{% url 'blog-delete' blog.pk %}">Eliminar publicación</a>
{% endblock %}
