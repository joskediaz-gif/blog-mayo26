<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <a href="{% url 'post-list' %}"><h1>Mi Blog</h1></a>
        <nav> 
            <a href="{% url 'blog-create' %}">Crear nueva publicación</a>
        </nav>
        <!-- login y log out -->
        {% if user.is_authenticated %}
            <p>Hola, {{ user.username }}!</p>
            <from method="post" action="{% url 'logout'%}">
                {% csrf_token %}
                <button type="submit">Cerrar Sesión</button>
            </from>
            {else %}
            <a href="{% url 'login' %}">Iniciar Sesión</a>
        {% endif %}  
    </header>
    {% block content %}
    {% endblock %}
</body>
</html>
