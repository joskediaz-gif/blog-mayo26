<!-- Recorrer la lista de publicaciones -->
 {% extends 'base.html' %}

 {% block content %}
{% for post in blog_list %}
    <ul>
       <li>
        <a href="{% url 'blog-detail' post.pk %}"><h2>{{ post.title }}</h2></a>
        <h2>{{ blog.title }}</h2>
        <p><strong>Autor:</strong> {{ post.author.username }}</p>
        <p><strong>Fecha de creacion:</strong> {{ post.created_at }}</p>
       </li>
    </ul>
{% endfor %}
{% endblock %}
